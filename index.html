<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Odontologia Berro — Mídia Indoor v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="brand">
      <img src="odontologia-berro.png" alt="Odontologia Berro" class="brand-logo"/>
      <div class="brand-name">Odontologia Berro</div>
    </div>
    <div class="hdr-center">
      <div class="live-badge"><span class="dot"></span>Ao Vivo</div>
    </div>
    <div class="hdr-right">
      <div class="chip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span class="chip-val" id="date-display">—</span>
      </div>
      <span id="clock">00:00</span>
      <div class="chip">
        <span id="wx-emoji" style="font-size:1.3em">🌤</span>
        <div><div class="chip-lbl">Tempo</div><div class="chip-val" id="wx-temp">—°C</div></div>
      </div>
      <div class="chip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>
        <div><div class="chip-lbl">Umidade</div><div class="chip-val" id="wx-hum">—%</div></div>
      </div>
    </div>
  </header>

  <!-- MAIN: YouTube embed -->
  <main id="main">
    <div id="yt-wrap">
      <iframe
        id="yt-player"
        src=""
        frameborder="0"
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

    <!-- Splash: exige clique para autoplay com som -->
    <div id="splash">
      <div id="splash-box">
        <div id="splash-icon">▶</div>
        <div id="splash-title">Toque para iniciar</div>
        <div id="splash-sub">A apresentação começará com áudio</div>
      </div>
    </div>

    <!-- Erro / sem playlist -->
    <div id="no-video">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="52" height="52"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <p>Verifique o <strong>config.js</strong> — playlist ID inválido ou não configurado.</p>
    </div>
  </main>

  <!-- FOOTER: Breaking News -->
  <footer>
    <div class="breaking-bar">
      <div class="breaking-tag">
        <span class="dot"></span>
        Breaking News
      </div>
      <div class="breaking-content" id="breaking-content">
        <span class="breaking-title" style="color:rgba(255,255,255,.4)">Carregando notícias…</span>
      </div>
    </div>
  </footer>

</div><!-- #app -->

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
